# Fail2Ban filter configuration for wg-easy
#
# Detects failed login attempts from wg-easy's security audit logs.
#
# Match example:
# [SECURITY AUDIT] Failed login attempt: INCORRECT_CREDENTIALS for user "admin". IP: 192.168.1.50
#

[Definition]
failregex = ^.*\[SECURITY AUDIT\] Failed login attempt:.* IP: <HOST>$

ignoreregex =
